[pytest]
asyncio_mode = auto

# Default options: verbose output + HTML report on every run
addopts =
    -v
    --tb=short
    --html=reports/test_report.html
    --self-contained-html
    --alluredir=reports/allure-results

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    asyncio: async test (auto-applied via asyncio_mode=auto)
    live: requires LIVE_TESTS=1 and valid API keys
    chaos: fault-injection and negative scenario tests
    slow: tests that run deliberately slow (latency checks)

# Log capture — surfaces structured logs in test output on failure
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s
log_cli_date_format = %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s